version = 3
final_space = true

[secondary_prompt]
#  template = '  ÔÇª '
  foreground = 'default'
  background = 'black'

[transient_prompt]
  template = '{{ if gt .Code 0 }}´Çì{{ else }}´äá  {{ end }}{{ .Segments.Path.Path }} ¯¬Â '
  foreground = 'default'
  background = 'transparent'

[[blocks]]
  type = 'prompt'
  alignment = 'right'

  # --- vi-mode indicator ---
  [[blocks.segments]]
    type = 'text'
    style = 'powerline'
    foreground = 'default'
    background = 'black'
    template = ' {{ if eq .Env.POSH_VI_MODE "NORMAL" }} ¯ÿ½ NORM {{ else }} ¾░Å¬ INS {{ end }} '

  [[blocks.segments]]
    type = 'executiontime'
    style = 'powerline'
    foreground = 'default'
    background = 'black'
    template = ' ¾░öƒ {{ .FormattedMs }}'

    [blocks.segments.properties]
      cache_duration = 'none'
      min = 500

[[blocks]]
  type = 'prompt'
  alignment = 'left'

  [[blocks.segments]]
    type = 'path'
    style = 'powerline'
    foreground = 'default'
    background = 'default'
    template = ' {{ .Path }} '

    [blocks.segments.properties]
      cache_duration = 'none'
      folder_icon = ' ´ü╝ '
      folder_separator_icon = '/'
      hide_root_location = false
      home_icon = '´Çò '
      max_depth = 3
      style = 'agnoster_short'

      [blocks.segments.properties.mapped_locations]
        '~' = '´Çò '
        '~/dotfiles' = '¯ÿò '
        '~/storage/shared/Download/' = '´ÇÖ '
        '~/storage/shared/indev/' = '¾░ÿª '
        '~/dev' = '´äí '
        '~/storage/shared/Documents/Syn' = '¾░á«b'
        '/storage/emulated/0/Documents/Syn' = '¾░á«b'
        'data/data/com.termux/files/usr' = '´Çç '
        'data/data/com.termux/files/usr/bin' = '´ô╣ '

  [[blocks.segments]]
    type = 'git'
    style = 'powerline'
    foreground = 'default'
    background = 'black'
    template = ' ¯£Ñ {{ .HEAD }}{{ if .Working.Changed }} ´é¡{{ end }}{{ if .Staging.Changed }} ´üå{{ end }}{{ if .StashCount }} ´ÜÆ{{ .StashCount }}{{ end }}{{ if gt .Behind 0 }} Ôçú{{ .Behind }}{{ end }}{{ if gt .Ahead 0 }} Ôçí{{ .Ahead }}{{ end }} '

    [blocks.segments.properties]
      branch_max_length = 28
      cache_duration = 'none'
      display_status_detail = true
      fetch_status = true
      fetch_upstream_icon = true

  [[blocks.segments]]
    type = 'python'
    style = 'powerline'
    foreground = 'default'
    background = 'black'
    template = ' ¯êÁ {{ .Venv }} '

    [blocks.segments.properties]
      cache_duration = 'none'

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    type = 'status'
    style = 'powerline'
    foreground = 'default'
    background = 'black'
    template = '{{ if gt .Code 0 }}´Çì {{ .Code }}{{ end }}'

    [blocks.segments.properties]
      always_enabled = false
      cache_duration = 'none'

  [[blocks.segments]]
    type = 'text'
    style = 'powerline'
    foreground = 'default'
    background = 'black'
    template = '´ï£ '

    [blocks.segments.properties]
      cache_duration = 'none'

